workflows:
  ios-release:
    name: Build iOS Release
    environment:
      vars:
        BUNDLE_ID: "com.jolo_use.apps"
        APP_STORE_CONNECT_TEAM_ID: "ZBGNBJ5RX2"
    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build iOS (with automatic signing)
        script: |
          flutter build ios --release --no-codesign

      - name: Build .ipa for release
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -sdk iphoneos -configuration Release archive -archivePath build/ios/archive/Runner.xcarchive

    artifacts:
      - build/ios/archive/*.ipa

    publishing:
      email:
        recipients:
          - madigitals2020@gmail.com

