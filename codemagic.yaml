workflows:
  ios-workflow:
    name: iOS Release Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: "sixam_mart"
        BUNDLE_ID: "com.jolouser.app"
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Build .ipa for release
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - madigitals2020@gmail.com

    signing:
      use_apple_signing: true
      apple_team_id: ZBGNBJ5RX2
      app_identifier: com.jolouser.app
      api_key_id: 776A9SJ4VX
      issuer_id: 40708fde-4d93-4c2a-bd84-4f08bab1a01f
      api_key_path: secure://api_key.p8
